- id: RULE-AV-001
  name: No Antivirus Provider Registered
  condition:
    check_id_prefix: WIN-AV
    status: fail
  base_score: 8.8
  severity: CRITICAL
  weight: 1.4
  cvss_vector: "CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:U/C:H/I:H/A:H"
  remediation:
    - "Enable Windows Defender: Set-MpPreference -DisableRealtimeMonitoring $false"
